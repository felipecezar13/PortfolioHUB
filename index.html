<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Felipe Cezar — Portfólio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ─── TOKENS ─── */
    :root {
      --bg:          #F5F5F0;
      --bg-card:     #FFFFFF;
      --bg-nav:      rgba(245, 245, 240, 0.92);
      --text:        #0A0A0A;
      --text-muted:  #6B6B6B;
      --border:      #E0E0D8;
      --accent:      #4361EE;
      --accent-dim:  #E8ECFF;
      --shadow:      0 4px 24px rgba(0,0,0,0.07);
      --shadow-hover:0 12px 40px rgba(67,97,238,0.18);
      --radius:      10px;
      --transition:  0.25s ease;
    }
    [data-theme="dark"] {
      --bg:          #0D0D14;
      --bg-card:     #16161F;
      --bg-nav:      rgba(13,13,20,0.92);
      --text:        #F0F0EC;
      --text-muted:  #888896;
      --border:      #222230;
      --accent:      #6B83F5;
      --accent-dim:  #1A1D38;
      --shadow:      0 4px 24px rgba(0,0,0,0.4);
      --shadow-hover:0 12px 40px rgba(107,131,245,0.22);
    }

    /* ─── RESET ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      transition: background var(--transition), color var(--transition);
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }

    /* ─── SCROLLBAR ─── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ─── NAVIGATION ─── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: var(--bg-nav);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      transition: background var(--transition), border-color var(--transition);
    }
    .nav-inner {
      max-width: 1160px; margin: 0 auto;
      padding: 0 2rem;
      height: 64px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem; font-weight: 500;
      color: var(--text);
      letter-spacing: -0.01em;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links {
      display: flex; align-items: center; gap: 2rem;
      list-style: none;
    }
    .nav-links a {
      font-size: 0.875rem; font-weight: 500;
      color: var(--text-muted);
      transition: color var(--transition);
    }
    .nav-links a:hover { color: var(--text); }
    .theme-btn {
      background: none; border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer;
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted);
      transition: border-color var(--transition), color var(--transition), background var(--transition);
      font-size: 1rem;
    }
    .theme-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: transform 0.3s, opacity 0.3s;
    }

    /* ─── HERO ─── */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 0 2rem; padding-top: 64px;
      max-width: 1160px; margin: 0 auto;
    }
    .hero-content { max-width: 680px; }
    .hero-eyebrow {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem; font-weight: 500;
      color: var(--accent);
      letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
    .hero-title {
      font-size: clamp(2.4rem, 6vw, 4.2rem);
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }
    .hero-subtitle {
      font-size: clamp(1.1rem, 2.5vw, 1.35rem);
      font-weight: 400;
      color: var(--text-muted);
      margin-bottom: 2rem;
      min-height: 2em;
    }
    .cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--accent);
      vertical-align: text-bottom;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .hero-desc {
      font-size: 1rem; color: var(--text-muted);
      max-width: 520px; margin-bottom: 2.5rem;
      line-height: 1.8;
    }
    .hero-cta {
      display: flex; gap: 1rem; flex-wrap: wrap;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.75rem;
      border-radius: 8px;
      font-size: 0.9rem; font-weight: 600;
      cursor: pointer; border: none;
      transition: all var(--transition);
      text-decoration: none;
    }
    .btn-primary {
      background: var(--accent); color: #fff;
    }
    .btn-primary:hover { filter: brightness(1.12); transform: translateY(-1px); box-shadow: var(--shadow-hover); }
    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--text);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
    .hero-scroll {
      margin-top: 4rem;
      display: flex; align-items: center; gap: 0.75rem;
      font-size: 0.78rem; color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }
    .scroll-line {
      width: 48px; height: 1px; background: var(--border);
    }

    /* ─── SECTIONS ─── */
    section { padding: 7rem 2rem; max-width: 1160px; margin: 0 auto; }
    .section-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem; font-weight: 500;
      color: var(--accent); letter-spacing: 0.12em;
      text-transform: uppercase; margin-bottom: 0.75rem;
    }
    .section-title {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 700; letter-spacing: -0.025em;
      margin-bottom: 1rem;
    }
    .section-sub {
      font-size: 1rem; color: var(--text-muted);
      max-width: 520px; line-height: 1.8;
      margin-bottom: 3.5rem;
    }
    .divider {
      width: 48px; height: 3px; background: var(--accent);
      border-radius: 2px; margin-bottom: 1rem;
    }

    /* ─── ABOUT ─── */
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem; align-items: center;
    }
    .about-img-wrap {
      position: relative;
    }
    .about-img-placeholder {
      width: 100%; aspect-ratio: 4/5;
      border-radius: var(--radius);
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; color: var(--text-muted);
    }
    .about-accent-box {
      position: absolute; bottom: -1.5rem; right: -1.5rem;
      background: var(--accent); border-radius: 8px;
      padding: 1.25rem 1.5rem; color: #fff;
    }
    .about-accent-box strong { display: block; font-size: 1.8rem; font-weight: 700; line-height: 1; }
    .about-accent-box span { font-size: 0.78rem; opacity: 0.85; }
    .about-text p { color: var(--text-muted); line-height: 1.9; margin-bottom: 1rem; }
    .about-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1.5rem; }
    .tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; font-weight: 500;
      padding: 0.3rem 0.75rem;
      border-radius: 5px;
      background: var(--accent-dim); color: var(--accent);
      border: 1px solid transparent;
    }

    /* ─── PROJECTS ─── */
    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
    }
    .project-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: transform var(--transition), box-shadow var(--transition), border-color var(--transition);
      cursor: pointer;
    }
    .project-card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-hover);
      border-color: var(--accent);
    }
    .project-img-wrap {
      overflow: hidden; aspect-ratio: 16/9;
    }
    .project-img-placeholder {
      width: 100%; height: 100%;
      background: var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      transition: transform 0.4s ease;
    }
    .project-card:hover .project-img-placeholder { transform: scale(1.04); }
    .project-body { padding: 1.5rem; }
    .project-tags { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.75rem; }
    .project-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem; font-weight: 500;
      padding: 0.2rem 0.6rem; border-radius: 4px;
      background: var(--accent-dim); color: var(--accent);
    }
    .project-title {
      font-size: 1.05rem; font-weight: 700;
      letter-spacing: -0.01em; margin-bottom: 0.5rem;
    }
    .project-desc {
      font-size: 0.875rem; color: var(--text-muted);
      line-height: 1.7; margin-bottom: 1.25rem;
    }
    .project-links { display: flex; gap: 0.75rem; }
    .project-link {
      font-size: 0.8rem; font-weight: 600;
      color: var(--accent);
      display: flex; align-items: center; gap: 0.3rem;
      transition: gap var(--transition);
    }
    .project-link:hover { gap: 0.5rem; }

    /* ─── CURRICULUM / SKILLS ─── */
    .cv-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3rem;
    }
    .cv-block { margin-bottom: 2.5rem; }
    .cv-block-title {
      font-size: 0.78rem; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 1.25rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }
    .skill-item { margin-bottom: 1rem; }
    .skill-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 0.4rem;
    }
    .skill-name { font-size: 0.875rem; font-weight: 500; }
    .skill-pct {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.75rem; color: var(--text-muted);
    }
    .skill-bar {
      height: 5px; background: var(--border); border-radius: 4px; overflow: hidden;
    }
    .skill-fill {
      height: 100%; border-radius: 4px; background: var(--accent);
      width: 0; transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* Experience timeline */
    .timeline { position: relative; padding-left: 1.5rem; }
    .timeline::before {
      content: ''; position: absolute; left: 0; top: 6px; bottom: 6px;
      width: 1px; background: var(--border);
    }
    .tl-item { position: relative; margin-bottom: 2rem; }
    .tl-dot {
      position: absolute; left: -1.5rem; top: 6px;
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--accent); border: 2px solid var(--bg);
      transform: translateX(-3.5px);
    }
    .tl-date {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem; color: var(--accent);
      margin-bottom: 0.25rem; letter-spacing: 0.04em;
    }
    .tl-role { font-size: 0.95rem; font-weight: 700; margin-bottom: 0.15rem; }
    .tl-company { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 0.4rem; }
    .tl-desc { font-size: 0.85rem; color: var(--text-muted); line-height: 1.7; }

    /* ─── CONTACT ─── */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.4fr;
      gap: 4rem; align-items: start;
    }
    .contact-info p {
      color: var(--text-muted); line-height: 1.8;
      margin-bottom: 2rem; font-size: 0.95rem;
    }
    .social-links { display: flex; flex-direction: column; gap: 0.75rem; }
    .social-link {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.875rem 1.25rem;
      border-radius: 8px;
      border: 1
